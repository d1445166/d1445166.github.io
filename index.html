<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初光之櫻：青澀互動小說</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 漂浮櫻花裝飾 (CSS繪製) -->
    <div class="petals-container">
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="petal p5"></div>
    </div>

    <div class="game-container">
        <!-- 首頁畫面 -->
        <div id="home-screen" class="screen active">
            <div class="icon-heart">🌸</div>
            <h1 class="main-title">初光之櫻：青澀回憶</h1>
            <p class="intro-text">這是一段關於青春、重逢與選擇的故事。<br>你的每一個決定，都會引導向不同的結局。</p>
            <button id="start-btn" class="action-btn">開始故事</button>
        </div>

        <!-- 故事選擇畫面 -->
        <div id="story-screen" class="screen">
            <div class="story-content card">
                <h2 id="story-title">章節名稱</h2>
                <div class="divider"></div>
                <p id="story-text">故事內容敘述...</p>
            </div>
            
            <div id="choices-container" class="choices-area">
                <!-- 選項按鈕將會透過 JavaScript 動態生成到這裡 -->
            </div>
        </div>

        <!-- 結局畫面 -->
        <div id="ending-screen" class="screen">
            <div class="ending-content card">
                <div class="ending-icon">✨</div>
                <h2 id="ending-title" class="ending-title">結局名稱</h2>
                <div class="divider"></div>
                <p id="ending-text" class="ending-text">結局詳細內容...</p>
            </div>
            <button id="restart-btn" class="action-btn outline">重新開始故事</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
