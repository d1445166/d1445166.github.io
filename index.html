<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘星空占卜</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    <div class="fortune-container">
        
        <!-- 首頁區塊 -->
        <div id="home-section" class="active">
            <div class="crystal-ball">🔮</div>
            <h1>神秘星空占卜</h1>
            <p>想知道今天的運勢如何嗎？<br>集中精神，點擊下方按鈕抽取你的專屬指引。</p>
            <button id="draw-btn" class="mystic-btn">抽取運勢籤</button>
        </div>

        <!-- 載入中區塊 -->
        <div id="loading-section">
            <div class="spinner"></div>
            <p>正在為您連結宇宙能量...</p>
        </div>

        <!-- 結果區塊 -->
        <div id="result-section">
            <h2 id="fortune-name">大吉 🌟</h2>
            <p id="fortune-desc" class="desc-text">今日運氣極佳...</p>
            
            <div class="aspects-grid">
                <div class="aspect-card">
                    <span class="aspect-icon">💼</span>
                    <h3>工作</h3>
                    <p id="fortune-work">...</p>
                </div>
                <div class="aspect-card">
                    <span class="aspect-icon">📚</span>
                    <h3>學業</h3>
                    <p id="fortune-study">...</p>
                </div>
                <div class="aspect-card">
                    <span class="aspect-icon">💖</span>
                    <h3>愛情</h3>
                    <p id="fortune-love">...</p>
                </div>
                <div class="aspect-card">
                    <span class="aspect-icon">💰</span>
                    <h3>金錢</h3>
                    <p id="fortune-money">...</p>
                </div>
            </div>

            <p id="fortune-closing" class="closing-text">結語...</p>
            <button id="retry-btn" class="mystic-btn outline">再占卜一次</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
