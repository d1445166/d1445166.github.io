<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋遊戲</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>五子棋</h1>
            <p class="rules">規則：黑白雙方輪流落子，先將 5 顆同色棋子連成一線（橫、豎、斜）者獲勝。</p>
        </header>

        <div class="game-info">
            <div id="status">當前輪到：<span id="current-player" class="black-turn">黑子</span></div>
            <button id="restart-btn">重新開始遊戲</button>
        </div>

        <div id="board" class="turn-black"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
